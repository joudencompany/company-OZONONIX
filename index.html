    <script>
      // Reactが#rootに描画したらプリレンダーを削除
      var _obs = new MutationObserver(function() {
        if (document.getElementById('root').childElementCount > 0) {
          var pr = document.getElementById('prerender');
          var st = document.getElementById('prerender-style');
          if (pr) pr.remove();
          if (st) st.remove();
          _obs.disconnect();
        }
      });
      _obs.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
