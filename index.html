    <style id="prerender-style">
      #prerender {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;

        letter-spacing: 0.04em;
        margin-bottom: 12px;
        text-shadow: 0 2px 16px rgba(0,0,0,0.18);

        opacity: 0.92;
        margin-bottom: 28px;
        line-height: 1.7;
      }
      #prerender .pr-badges {

        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        margin-bottom: 36px;

      #prerender .pr-badge {

        border-radius: 999px;
        padding: 6px 18px;
        font-size: clamp(0.75rem, 2.5vw, 0.95rem);
        font-weight: 600;
        backdrop-filter: blur(4px);
      }
      #prerender .pr-btns {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        justify-content: center;
      }
      #prerender .pr-btn-primary {
        background: #fff;
        color: #6366f1;
        font-weight: 800;
        font-size: clamp(0.9rem, 3vw, 1.05rem);
        padding: 14px 32px;
        border-radius: 999px;
        text-decoration: none;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        transition: transform 0.15s;
      }
      #prerender .pr-btn-secondary {
        background: transparent;
        color: #fff;
        font-weight: 700;
        font-size: clamp(0.9rem, 3vw, 1.05rem);
        padding: 14px 32px;
        border-radius: 999px;
        border: 2px solid rgba(255,255,255,0.7);

      </div>
    </div>

    <script>
      // Reactが#rootに描画したらプリレンダーを削除
      var _obs = new MutationObserver(function() {
        if (document.getElementById('root').childElementCount > 0) {
          var pr = document.getElementById('prerender');
          var st = document.getElementById('prerender-style');
          if (pr) pr.remove();
          if (st) st.remove();
          _obs.disconnect();
        }
      });
      _obs.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
