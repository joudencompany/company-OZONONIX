        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        transition: transform 0.15s;
      }
      #prerender .pr-btn-secondary {
        background: transparent;
        color: #fff;
        font-weight: 700;
        font-size: clamp(0.9rem, 3vw, 1.05rem);
        padding: 14px 32px;
        border-radius: 999px;
        border: 2px solid rgba(255,255,255,0.7);
        text-decoration: none;
        transition: transform 0.15s;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- プリレンダーヒーロー（Reactが起動するまでの表示） -->
    <div id="prerender">
      <div class="pr-logo">OZONONIX</div>
      <div class="pr-sub">
        ホームページ制作・シフト管理アプリ<br>
        熊本発 — 全国対応
      </div>
      <div class="pr-badges">
        <span class="pr-badge">初月1ヶ月無料</span>
        <span class="pr-badge">全額返金保証</span>
        <span class="pr-badge">最短3日導入</span>
        <span class="pr-badge">違約金なし</span>
      </div>
      <div class="pr-btns">
        <a href="/shift-app/" class="pr-btn-primary">シフト管理アプリを見る</a>
        <a href="/hp/" class="pr-btn-secondary">HP制作を見る</a>
        <a href="/app/" class="pr-btn-secondary">業務アプリ開発を見る</a>
      </div>
    </div>

    <script>
      // Reactが#rootに描画したらプリレンダーを削除
      var _obs = new MutationObserver(function() {
        if (document.getElementById('root').childElementCount > 0) {
          var pr = document.getElementById('prerender');
          var st = document.getElementById('prerender-style');
          if (pr) pr.remove();
          if (st) st.remove();
          _obs.disconnect();
        }
      });
      _obs.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
